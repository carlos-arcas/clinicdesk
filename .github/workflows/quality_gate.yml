name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  core:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Python and pip versions
        run: |
          set -euxo pipefail
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Verify pip_audit import
        run: |
          set -euxo pipefail
          python -c "import pip_audit; print('pip_audit_ok')"
          python -m pip show pip-audit

      - name: Compile sanity check
        run: python -m compileall -q clinicdesk scripts tests

      - name: Install gitleaks
        run: |
          sudo apt-get update
          sudo apt-get install -y gitleaks
          gitleaks version

      - name: Run canonical PR gate (blocking)
        id: gate
        env:
          PYTHONPATH: .
        run: python -m scripts.gate_pr

      - name: Top hotspots (from report)
        if: always()
        run: |
          if [ -f docs/quality_report.md ]; then
            echo "Top hotspots (preview from docs/quality_report.md):"
            sed -n '1,40p' docs/quality_report.md
          else
            echo "No quality report found (docs/quality_report.md)."
          fi

      - name: Show security reports tail
        if: always()
        run: |
          set -euxo pipefail
          if [ -f docs/pip_audit_report.txt ]; then
            echo "Last 80 lines of docs/pip_audit_report.txt:"
            tail -n 80 docs/pip_audit_report.txt
          else
            echo "docs/pip_audit_report.txt not found."
          fi

          if [ -f docs/secrets_scan_report.txt ]; then
            echo "Last 80 lines of docs/secrets_scan_report.txt:"
            tail -n 80 docs/secrets_scan_report.txt
          else
            echo "docs/secrets_scan_report.txt not found."
          fi

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts-py${{ matrix.python-version }}
          if-no-files-found: ignore
          path: |
            docs/quality_report.md
            docs/coverage.xml
            docs/coverage.json
            docs/pip_audit_report.txt
            docs/mypy_report.txt
            docs/secrets_scan_report.txt
            logs/*.log
            .coverage
            htmlcov/**

      - name: Generar comentario PR Quality Gate
        if: always() && github.event_name == 'pull_request'
        env:
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python -m scripts.ci.generar_comentario_pr_quality_gate

      - name: Buscar comentario existente
        if: always() && github.event_name == 'pull_request'
        id: fc
        continue-on-error: true
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- clinicdesk-quality-gate -->'

      - name: Crear o actualizar comentario PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: docs/pr_quality_gate_comment.md
          edit-mode: replace

  ui_smoke:
    name: ui_smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install Linux UI libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0

      - name: Run UI smoke tests when present
        env:
          PYTHONPATH: .
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: qt.qpa.*=false
        run: |
          if [ -d tests/ui ] || rg -n "@pytest\.mark\.ui|pytestmark\s*=.*ui" tests >/dev/null 2>&1; then
            set +e
            xvfb-run -a python -m pytest -q -m "ui and smoke" -rs tests/ui | tee ui_smoke.log
            rc=$?
            set -e
            if [ "$rc" -eq 5 ]; then
              echo "UI smoke selector found no tests; skipping cleanly."
              exit 0
            fi
            exit "$rc"
          else
            echo "No UI tests/markers detected; skipping ui_smoke job."
          fi

      - name: Validate UI smoke run is not all-skipped
        if: always()
        run: |
          if [ ! -f ui_smoke.log ]; then
            echo "ui_smoke.log not found; skipping UI smoke skip validation."
            exit 0
          fi
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          log = Path("ui_smoke.log").read_text(encoding="utf-8", errors="ignore")
          no_ejecutados = bool(re.search(r"=+\s*0\s+passed\b", log)) or bool(
              re.search(r"collected\s+0\s+items", log)
          )
          con_skipped = "skipped" in log.lower()

          if no_ejecutados and con_skipped:
              print(
                  "UI smoke job failed: pytest reported skips with zero executed tests. "
                  "Review Qt runtime dependencies and headless setup."
              )
              sys.exit(1)

          print("UI smoke skip validation passed.")
          PY

  uiqt:
    name: uiqt (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux UI libs
        run: |
          # Dependencias XCB mínimas adicionales para runners donde Qt falla al inicializar plugin xcb.
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-xkb1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run UI Qt tests when present
        env:
          PYTHONPATH: .
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: qt.qpa.*=false
        run: |
          if [ -d tests/ui ] || rg -n "@pytest\.mark\.uiqt|pytestmark\s*=.*uiqt" tests >/dev/null 2>&1; then
            set +e
            xvfb-run -a python -m pytest -q -m "uiqt" -rs tests/ui | tee uiqt.log
            rc=$?
            set -e
            if [ "$rc" -eq 5 ]; then
              echo "UI Qt selector found no tests; skipping cleanly."
              exit 0
            fi
            exit "$rc"
          else
            echo "No UI Qt tests/markers detected; skipping uiqt job."
          fi

      - name: Validate UI Qt run is not all-skipped
        if: always()
        run: |
          if [ ! -f uiqt.log ]; then
            echo "uiqt.log not found; skipping UI Qt skip validation."
            exit 0
          fi
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          log = Path("uiqt.log").read_text(encoding="utf-8", errors="ignore")
          no_ejecutados = bool(re.search(r"=+\s*0\s+passed\b", log)) or bool(
              re.search(r"collected\s+0\s+items", log)
          )
          con_skipped = "skipped" in log.lower()

          if no_ejecutados and con_skipped:
              print(
                  "UI Qt job failed: pytest reported skips with zero executed tests. "
                  "Review Qt runtime dependencies and headless setup."
              )
              sys.exit(1)

          print("UI Qt skip validation passed.")
          PY

      - name: Upload UI Qt logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uiqt-logs
          if-no-files-found: ignore
          path: |
            uiqt.log
            logs/*.log

  build_release:
    name: build_release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build release bundle
        env:
          PYTHONPATH: .
        run: python -m scripts.build_release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinicdesk-release-bundle
          path: dist/*.zip
          if-no-files-found: error
