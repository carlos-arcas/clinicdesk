services:
  clinicdesk-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      CLINICDESK_API_KEY: dev_key_demo
      CLINICDESK_DB_PATH: /data/clinicdesk_demo.db
    ports:
      - "8000:8000"
    volumes:
      - clinicdesk_api_data:/data

volumes:
  clinicdesk_api_data:
